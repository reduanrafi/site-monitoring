name: Uptime Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub's minimum interval)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to save status.json between runs

# If a run is still going when the next one starts, skip rather than stack up.
concurrency:
  group: uptime-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python monitor.py

      - name: Save status between runs
        run: |
          if [[ -n "$(git status --porcelain status.json)" ]]; then
            git config user.name  "uptime-bot"
            git config user.email "uptime-bot@users.noreply.github.com"
            git add status.json
            git commit -m "update status [skip ci]"
            git push
          fi
